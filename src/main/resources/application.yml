
  server:
    port: ${SERVER_PORT:8080}

  spring:
    application:
      name: ecommerce

    datasource:
      url: ${DB_URL}
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
      driver-class-name: org.postgresql.Driver

      hikari:
        maximum-pool-size: 10
        minimum-idle: 5
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000

    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      open-in-view: false

      properties:
        hibernate:
          format_sql: true
          jdbc:
            time_zone: UTC

    servlet:
      multipart:
        enabled: true
        max-file-size: 10MB
        max-request-size: 20MB

  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: ${JWT_ACCESS_EXPIRATION}
    refresh-token-expiration: ${JWT_REFRESH_EXPIRATION}

  aws:
    region: ${AWS_REGION}

    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}

    s3:
      bucket-name: ${AWS_BUCKET_NAME}

  momo:
    partner-code: ${MOMO_PARTNER_CODE}
    access-key: ${MOMO_ACCESS_KEY}
    secret-key: ${MOMO_SECRET_KEY}

    endpoint: ${MOMO_ENDPOINT}

    redirect-url: ${MOMO_REDIRECT_URL}
    ipn-url: ${MOMO_IPN_URL}

  logging:
    level:
      root: INFO
      org.springframework.security: INFO
      org.hibernate.SQL: DEBUG
      org.hibernate.orm.jdbc.bind: TRACE

